<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة لشهد</title>
    <style>
        body {
    background: linear-gradient(135deg, #ff4d4d, #4d79ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    direction: rtl;
    font-family: "Tajawal", sans-serif;
    margin: 0;
}

.card {
    background: rgba(255, 255, 255, 0.15);
    padding: 25px 35px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
    width: 320px;
    text-align: center;
    color: white;
}

h1 {
    margin-bottom: 15px;
    font-size: 28px;
}

p {
    line-height: 1.8;
    font-size: 16px;
}
    </style>

</head>
<body>
    <div class="card">
        <h1>مرحبا 👋</h1>
        <p>
            فيه كلام حابب أقوله بكل احترام…  
            أنا شايفك شخصية جميلة وراقية، وحبيت أشاركك إنك مميزة عندي.  
            مفيش أي ضغط عليك، بس حبيت تكوني عارفة.
        </p>
    </div>
</body>
</html>
